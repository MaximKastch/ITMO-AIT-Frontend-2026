<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поиск транзакций — MyWallet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-primary px-3 mb-4 shadow-sm" aria-label="Навигация страницы поиска">
    <a class="navbar-brand fw-bold" href="dashboard.html">MyWallet</a>
    <div class="d-flex align-items-center ms-auto">
        <a href="dashboard.html" class="nav-link-custom me-2">Главная</a>
        <a href="search.html" class="nav-link-custom me-2 active">Поиск</a>
        <a href="reports.html" class="nav-link-custom me-3">Аналитика</a>
        <a href="bank.html" class="nav-link-custom me-3">Банк</a>

        <span id="userNameDisplay" class="me-3 d-none d-sm-flex"></span>

        <button class="btn btn-outline-light btn-sm fw-bold border-0" onclick="logout()">Выйти</button>
    </div>
</nav>

<main class="container">
    <div class="card p-4 shadow-sm border-0">
        <h4 class="mb-4 fw-bold">Поиск транзакций</h4>
        <div class="row g-2 mb-4">
            <div class="col-12 col-md-4">
                <label for="filterCat" class="visually-hidden">Фильтр по категории</label>
                <input type="text" id="filterCat" class="form-control" placeholder="Категория">
            </div>
            <div class="col-12 col-md-4">
                <label for="filterSum" class="visually-hidden">Максимальная сумма</label>
                <input type="number" id="filterSum" class="form-control" placeholder="Макс. сумма">
            </div>
            <div class="col-12 col-md-4">
                <label for="filterDate" class="visually-hidden">Фильтр по дате</label>
                <input type="date" id="filterDate" class="form-control">
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle" aria-label="Таблица транзакций">
                <thead class="table-light">
                <tr>
                    <th>Категория</th>
                    <th>Сумма</th>
                    <th>Дата</th>
                </tr>
                </thead>
                <tbody id="transBody"></tbody>
            </table>
        </div>
    </div>
</main>

<script>
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    if (!localStorage.getItem('isLoggedIn') || !currentUser) {
        window.location.href = 'index.html';
    }

    async function renderTable() {
        const term = document.getElementById('filterCat').value.toLowerCase();
        const maxSum = parseFloat(document.getElementById('filterSum').value);
        const dateFilter = document.getElementById('filterDate').value;
        const response = await fetch(`http://localhost:3000/transactions?userId=${currentUser.id}`);
        const transactions = await response.json();

        const tbody = document.getElementById('transBody');
        tbody.innerHTML = '';

        transactions.filter(t =>
            (!term || t.cat.toLowerCase().includes(term)) &&
            (isNaN(maxSum) || parseFloat(t.sum) <= maxSum) &&
            (!dateFilter || t.date === dateFilter)
        ).forEach(t => {
            tbody.innerHTML += `<tr>
                <td class="fw-bold">${t.cat}</td>
                <td class="${t.type === 'plus' ? 'text-success' : 'text-danger'} fw-bold">
                    ${t.type === 'plus' ? '+' : '-'}${parseFloat(t.sum).toLocaleString()} ₽
                </td>
                <td>${t.date}</td>
            </tr>`;
        });
    }

    document.querySelectorAll('input').forEach(i => i.addEventListener('input', renderTable));
    renderTable();
</script>
<script src="js/shared.js"></script>
<script src="js/main.js"></script>
</body>
</html>
