<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет — MyWallet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar navbar-dark bg-primary px-3 mb-4 shadow-sm" aria-label="Основная навигация">
    <a class="navbar-brand fw-bold" href="dashboard.html">MyWallet</a>
    <div class="d-flex align-items-center ms-auto">
        <a href="dashboard.html" class="nav-link-custom me-2 active">Главная</a>
        <a href="search.html" class="nav-link-custom me-2">Поиск</a>
        <a href="reports.html" class="nav-link-custom me-3">Аналитика</a>
        <a href="bank.html" class="nav-link-custom me-3">Банк</a>

        <span id="userNameDisplay" class="me-3 d-none d-sm-flex"></span>

        <button class="btn btn-outline-light btn-sm fw-bold border-0" onclick="logout()">Выйти</button>
    </div>
</nav>

<main class="container">
    <div class="row g-3 mb-5">
        <div class="col-12 col-md-4">
            <section class="card p-4 h-100 shadow-sm border-0">
                <h5 class="text-muted small fw-bold text-uppercase">Мои счета</h5>
                <h2 id="accBalance" class="fw-bold mb-0">0 ₽</h2>
            </section>
        </div>
        <div class="col-12 col-md-4">
            <section class="card p-4 h-100 shadow-sm border-0">
                <h5 class="text-muted small fw-bold text-uppercase">Бюджет на месяц</h5>
                <div class="progress mb-2 mt-2" style="height: 12px; border-radius: 10px;">
                    <div class="progress-bar bg-success" id="budgetBar" role="progressbar"></div>
                </div>
                <small id="budgetStatus" class="text-muted">0 из 50 000 ₽</small>
            </section>
        </div>
        <div class="col-12 col-md-4">
            <button class="btn btn-primary w-100 py-3 shadow-sm border-0 fw-bold mb-2" data-bs-toggle="modal"
                    data-bs-target="#addMoneyModal">
                + Добавить транзакцию
            </button>
            <button class="btn btn-outline-purple w-100 py-2 shadow-sm fw-bold" onclick="importTransactions()">
                Импорт из банка
            </button>
            <div id="bankStatus" class="text-center mt-2 small fw-bold" style="color: #6b5588;"></div>
        </div>
    </div>

    <section class="mb-5" aria-labelledby="currency-title">
        <h4 id="currency-title" class="fw-bold mb-4 text-center text-muted">Мировые валюты</h4>

        <div class="row mb-3">
            <div class="col-12">
                <div id="rate-usd"></div>
            </div>
        </div>

        <div class="row g-3 mb-3">
            <div class="col-md-4">
                <div id="rate-eur"></div>
            </div>
            <div class="col-md-4">
                <div id="rate-cny"></div>
            </div>
            <div class="col-md-4">
                <div id="rate-gbp"></div>
            </div>
        </div>

        <div class="row g-3">
            <div class="col-6 col-md-3">
                <div id="rate-jpy"></div>
            </div>
            <div class="col-6 col-md-3">
                <div id="rate-try"></div>
            </div>
            <div class="col-6 col-md-3">
                <div id="rate-kzt"></div>
            </div>
            <div class="col-6 col-md-3">
                <div id="rate-amd"></div>
            </div>
        </div>
    </section>

    <section class="card p-4 mb-5 shadow-sm border-0">
        <h5 class="mb-3 fw-bold">Последние транзакции</h5>
        <ul class="list-group list-group-flush" id="recentTrans"></ul>
        <div class="row g-2 mt-2">
            <div class="col-md-6">
                <a href="search.html" class="btn btn-outline-purple w-100 border-2 py-2">
                    Детальный поиск
                </a>
            </div>
            <div class="col-md-6">
                <a href="reports.html" class="btn btn-primary w-100 py-2 border-0 fw-bold shadow-sm">
                    Отчеты и графики
                </a>
            </div>
        </div>
    </section>
</main>

<div class="modal fade" id="addMoneyModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow" style="border-radius: 20px;">
            <div class="modal-body p-4">
                <h5 class="mb-4 fw-bold">Новая операция</h5>
                <label for="typeInput" class="small text-muted mb-1">Тип операции</label>
                <select id="typeInput" class="form-select mb-3">
                    <option value="plus">Доход (+)</option>
                    <option value="minus">Расход (-)</option>
                </select>
                <label for="catInput" class="small text-muted mb-1">Категория</label>
                <input type="text" id="catInput" class="form-control mb-3" placeholder="Напр: Продукты">
                <label for="dateInput" class="small text-muted mb-1">Дата</label>
                <input type="date" id="dateInput" class="form-control mb-3">
                <label for="sumInput" class="small text-muted mb-1">Сумма</label>
                <input type="number" id="sumInput" class="form-control mb-4" placeholder="0.00">
                <button id="saveBtn" class="btn btn-success w-100 fw-bold py-2">Сохранить</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/shared.js"></script>
<script src="js/main.js"></script>
</body>
</html>
