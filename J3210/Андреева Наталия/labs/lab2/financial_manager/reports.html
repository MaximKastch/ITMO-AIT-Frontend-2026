<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аналитика — MyWallet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary px-3 mb-4 shadow-sm">
    <a class="navbar-brand fw-bold" href="dashboard.html">MyWallet</a>
    <div class="d-flex align-items-center ms-auto">
        <a href="dashboard.html" class="nav-link-custom me-2">Главная</a>
        <a href="search.html" class="nav-link-custom me-2">Поиск</a>
        <a href="reports.html" class="nav-link-custom me-3 active">Аналитика</a>
        <a href="bank.html" class="nav-link-custom me-3">Банк</a>
        <span id="userNameDisplay" class="me-3 d-none d-sm-flex"></span>
        <button class="btn btn-outline-light btn-sm fw-bold border-0" onclick="logout()">Выйти</button>
    </div>
</nav>

<main class="container mb-5">
    <h3 class="fw-bold mb-4" style="color: #2d3748;">Аналитический отчет</h3>

    <div class="row g-4">
        <div class="col-lg-6">
            <div class="card p-4 shadow-sm border-0 h-100">
                <h5 class="fw-bold mb-4 text-muted small text-uppercase">Расходы по категориям</h5>
                <canvas id="categoryChart"></canvas>
            </div>
        </div>

        <div class="col-lg-6">
            <div class="card p-4 shadow-sm border-0 h-100">
                <h5 class="fw-bold mb-4 text-muted small text-uppercase">Доходы и расходы по месяцам</h5>
                <canvas id="monthlyChart"></canvas>
            </div>
        </div>

        <div class="col-lg-12">
            <div class="card p-5 card-main-usd text-white border-0 shadow-sm text-center">
                <h5 class="fw-bold mb-2 opacity-75 text-uppercase small">Ожидаемый баланс к концу месяца</h5>
                <h1 id="forecastAmount" class="display-3 fw-bold mb-0">Вычисляем...</h1>
                <p class="mt-3 mb-0 opacity-50 small">Расчет произведен на основе средних трат в текущем календарном
                    периоде</p>
            </div>
        </div>
    </div>
</main>

<script>
    const user = JSON.parse(localStorage.getItem('currentUser'));
    if (!localStorage.getItem('isLoggedIn') || !user) {
        window.location.href = 'index.html';
    }

    const fullName = localStorage.getItem('userFullName');
    if (fullName && document.getElementById('userNameDisplay')) {
        document.getElementById('userNameDisplay').innerText = fullName;
    }

    async function initReports() {
        const response = await fetch(`http://localhost:3000/transactions?userId=${user.id}`);
        const transactions = await response.json();

        renderCategoryChart(transactions);
        renderMonthlyChart(transactions);
        calculateForecast(transactions);
    }

    function renderCategoryChart(transactions) {
        const cats = {};
        transactions.filter(t => t.type === 'minus').forEach(t => {
            cats[t.cat] = (cats[t.cat] || 0) + parseFloat(t.sum);
        });

        new Chart(document.getElementById('categoryChart'), {
            type: 'doughnut',
            data: {
                labels: Object.keys(cats),
                datasets: [{
                    data: Object.values(cats),
                    backgroundColor: [
                        '#4e54c8',
                        '#6c7d9f',
                        '#2d3748',
                        '#a3b1c6',
                        '#8f94fb',
                        '#1a202c',
                        '#3c366b',
                        '#4a5568',
                    ],
                    borderWidth: 2,
                    borderColor: '#ffffff'
                }]
            },
            options: {
                plugins: {legend: {position: 'bottom', labels: {padding: 20, font: {size: 12}}}},
                cutout: '75%'
            }
        });
    }

    function renderMonthlyChart(transactions) {
        const months = ['Янв', 'Фев', 'Мар', 'Апр', 'Май', 'Июн', 'Июл', 'Авг', 'Сен', 'Окт', 'Ноя', 'Дек'];
        const monthlyData = {};

        transactions.forEach(t => {
            const date = new Date(t.date);
            const key = `${date.getFullYear()}-${date.getMonth()}`;
            if (!monthlyData[key]) {
                monthlyData[key] = {income: 0, expense: 0, label: months[date.getMonth()]};
            }
            if (t.type === 'plus') monthlyData[key].income += parseFloat(t.sum);
            else monthlyData[key].expense += parseFloat(t.sum);
        });

        const sortedKeys = Object.keys(monthlyData).sort();

        new Chart(document.getElementById('monthlyChart'), {
            type: 'bar',
            data: {
                labels: sortedKeys.map(k => monthlyData[k].label),
                datasets: [
                    {
                        label: 'Поступления',
                        data: sortedKeys.map(k => monthlyData[k].income),
                        backgroundColor: '#6c7d9f',
                        borderRadius: 6
                    },
                    {
                        label: 'Траты',
                        data: sortedKeys.map(k => monthlyData[k].expense),
                        backgroundColor: '#2d3748',
                        borderRadius: 6
                    }
                ]
            },
            options: {
                responsive: true,
                plugins: {legend: {position: 'bottom'}},
                scales: {
                    y: {beginAtZero: true, grid: {display: false}},
                    x: {grid: {display: false}}
                }
            }
        });
    }

    function calculateForecast(transactions) {
        const now = new Date();
        const thisMonthTrans = transactions.filter(t => {
            const d = new Date(t.date);
            return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
        });

        const expMonth = thisMonthTrans.filter(t => t.type === 'minus').reduce((sum, t) => sum + parseFloat(t.sum), 0);
        let globalBal = 0;
        transactions.forEach(t => {
            globalBal += (t.type === 'plus' ? parseFloat(t.sum) : -parseFloat(t.sum));
        });

        const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        const forecast = globalBal - ((expMonth / now.getDate()) * (daysInMonth - now.getDate()));

        const element = document.getElementById('forecastAmount');
        if (element) {
            element.innerText = Math.round(forecast).toLocaleString() + " ₽";
            element.style.color = "white";
        }
    }

    initReports();
</script>
<script src="js/shared.js"></script>
<script src="js/main.js"></script>
</body>
</html>
