<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> ticket-tac.com </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Ticket-Tac</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="search.html">События</a>
                    </li>
                </ul>

                <div class="d-flex" id="authButtons">
                    <a href="login.html" class="btn btn-outline-light me-3">Вход</a>
                    <a href="register.html" class="btn btn-warning">Регистрация</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <main class="container my-5">
        <!-- Header -->
        <h1 class="mb-4">Events</h1>

        <!-- Filters -->
        <div class="row mb-4">
            <!-- 1. Type -->
            <div class="col-md-4">
            <select class="form-select">
            <option>All types</option>
            <option>Concert</option>
            <option>Festival</option>
            <option>Theatre</option>
            </select>
            </div>
            <!-- 2. Date -->
            <div class="col-md-4">
                <input type="date" class="form-control">
            </div>
            <!-- 3. City -->
            <div class="col-md-4">
                <input type="text" class="form-control" placeholder="City">
            </div>

        </div>


    <!-- Events grid -->
    <div class="row g-4">

        <!-- Event 1 -->
        <div class="col-md-4">
        <div class="card h-100 shadow-sm">

        <img src="" class="card-img-top">

        <div class="card-body">

        <h5 class="card-title">Some Event</h5>

        <p class="card-text text-muted">
        London · 1 JAN 2027
        </p>

        <button class="btn btn-warning"
        onclick="buyTicket('Some Event','1 Jan 2027')">
        Buy ticket
        </button>

        </div>
        </div>
        </div>
    </div>
    <!-- Footer -->
     <footer class="site-footer">
        <div class="container text-center">
            <p class="mb-1">© 2026 EventTickets</p>
            <small>ITMO AIT Front-End Project</small>
        </div>
    </footer>

    <!-- Add JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="js/script.js"></script>
    <script src="js/events.js"></script>
</body>
</html>
